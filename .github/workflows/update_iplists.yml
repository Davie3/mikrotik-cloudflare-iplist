name: update_iplists

on:
  schedule:
    - cron: "0 08 * * *" # 8:00 AM Coordinated Universal Time (UTC) / 12:00 AM Pacific Time (PT)
    - cron: "0 20 * * *" # 8:00 PM Coordinated Universal Time (UTC) / 12:00 PM Pacific Time (PT)
  workflow_dispatch:

permissions: {}

concurrency:
  group: update_iplists-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clone Project
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute update_iplists.py Script
        run: python cloudflare_ips.py

      - name: Validate Generated Lists
        run: |
          set -euo pipefail
          for f in cloudflare-ips-v4.rsc cloudflare-ips-v6.rsc; do
            test -s "$f" || { echo "::error::$f is missing or empty"; exit 1; }
            head -n1 "$f" | grep -q "^# Generated on " || { echo "::error::$f missing header"; exit 1; }
            grep -qE "^add list=cloudflare-ips(-v6)? address=" "$f" || { echo "::error::$f has no address-list entries"; exit 1; }
          done

      - name: Commit .rsc Files
        run: |
          set -euo pipefail
          NOW=$(date +"%m-%d-%Y %H:%M:%S PT")
          git config --local user.email "noreply@github.actions.bot"
          git config --local user.name "GitHub Actions"
          git add cloudflare-ips-v4.rsc cloudflare-ips-v6.rsc
          git status
          if ! git diff --cached --quiet; then
            git commit -m "Run automations and generate fresh lists - $NOW"
          fi

      - name: Push Changes
        uses: ad-m/github-push-action@881a6320fdb16eb5318c5054f31c218aec2b324c # v1.3.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
